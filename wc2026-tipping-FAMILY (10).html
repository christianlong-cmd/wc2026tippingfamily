<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⚽ WC2026 Tipping Comp</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f4f6f9;--surface:#fff;--surface2:#f0f3f7;--border:#dde3ec;
    --blue:#00529b;--blue-mid:#1a6dbf;--blue-light:#e8f1fb;
    --gold:#c9a84c;--gold-light:#fdf6e3;
    --text:#1a2a3a;--text-mid:#4a6070;--text-muted:#8a9faf;
    --green:#1a8a4a;--green-bg:#e8f7ee;--red:#c0392b;--red-bg:#fdecea;
    --font-d:'Bebas Neue',sans-serif;--font-b:'DM Sans',sans-serif;
    --r:8px;--sh:0 2px 8px rgba(0,50,100,.08);--sh-md:0 4px 20px rgba(0,50,100,.12)
  }
  html{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:14px}
  body{min-height:100vh}

  /* HEADER */
  .hdr{background:var(--blue);box-shadow:0 2px 12px rgba(0,30,80,.25);position:sticky;top:0;z-index:50;width:100%}
  .hdr-in{max-width:900px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;gap:16px;width:100%}
  .brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
  .brand-icon{font-size:26px}
  .brand-title{font-family:var(--font-d);font-size:22px;letter-spacing:3px;color:#fff;line-height:1}
  .brand-sub{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.5);margin-top:3px}
  nav{display:flex;align-items:center;gap:2px;height:100%}
  .nb{padding:16px 14px;background:transparent;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,.5);cursor:pointer;font-size:11px;letter-spacing:1.5px;font-weight:600;font-family:var(--font-b);transition:all .2s;text-transform:uppercase;display:flex;align-items:center;height:100%}
  .nb:hover{color:rgba(255,255,255,.85)}
  .nb.on{color:#fff;border-bottom-color:var(--gold)}

  .body{max-width:900px;margin:0 auto;padding:20px 16px 48px}

  /* LOADING */
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* TOAST */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--blue);border-radius:6px;padding:10px 20px;font-size:12px;color:#fff;letter-spacing:1px;font-weight:600;transition:transform .3s;z-index:200;white-space:nowrap;box-shadow:var(--sh-md)}
  #toast.show{transform:translateX(-50%) translateY(0)}

  .slabel{font-size:10px;letter-spacing:3px;font-weight:600;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px}

  /* OVERLAY / MODAL */
  .overlay{position:fixed;inset:0;background:rgba(0,20,60,.55);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(3px)}
  .modal{background:#fff;border-radius:12px;padding:32px;max-width:360px;width:90%;box-shadow:0 20px 60px rgba(0,30,80,.2)}
  .modal-title{font-family:var(--font-d);font-size:24px;letter-spacing:3px;color:var(--blue);margin-bottom:6px}
  .modal-sub{font-size:13px;color:var(--text-muted);margin-bottom:24px;line-height:1.6}
  /* PIN */
  .pin-dots{display:flex;gap:10px;justify-content:center;margin:20px 0}
  .pin-dot{width:16px;height:16px;border-radius:50%;background:var(--border);transition:background .15s}
  .pin-dot.filled{background:var(--blue)}
  .pin-kp{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
  .pk{padding:16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;font-size:20px;font-weight:600;cursor:pointer;text-align:center;font-family:var(--font-b);color:var(--text);transition:all .1s;user-select:none}
  .pk:hover{background:var(--blue-light);border-color:var(--blue-mid);color:var(--blue)}
  .pk:active{transform:scale(.95)}
  .pk.del{font-size:16px;color:var(--text-muted)}
  .pin-err{color:var(--red);font-size:12px;text-align:center;font-weight:600;min-height:18px;margin-bottom:8px}

  /* PILLS */
  .pill-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
  .pills{display:flex;gap:6px;flex-wrap:wrap}
  .pill{padding:7px 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:20px;color:var(--text-mid);cursor:pointer;font-size:13px;font-family:var(--font-b);font-weight:500;transition:all .15s;box-shadow:var(--sh)}
  .pill:hover{border-color:var(--blue-mid);color:var(--blue)}
  .pill.on{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 10px rgba(0,82,155,.3)}

  /* STAGE / GROUP BARS */
  .stage-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
  .sb{padding:6px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:6px;color:var(--text-muted);cursor:pointer;font-size:11px;font-weight:600;font-family:var(--font-b);transition:all .15s;text-transform:uppercase}
  .sb:hover{border-color:var(--blue-mid);color:var(--blue)}
  .sb.on{background:var(--blue);border-color:var(--blue);color:#fff}
  .pts{font-size:9px;opacity:.7;margin-left:2px}

  .grp-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
  .gb{width:36px;height:36px;background:var(--surface);border:1.5px solid var(--border);border-radius:6px;color:var(--text-muted);cursor:pointer;font-size:14px;font-weight:700;font-family:var(--font-b);transition:all .15s}
  .gb:hover{border-color:var(--blue-mid);color:var(--blue)}
  .gb.on{background:var(--blue);border-color:var(--blue);color:#fff}

  /* GROUP HEADER */
  .grp-hdr{background:var(--blue);border-radius:var(--r);padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .grp-hdr-title{font-family:var(--font-d);font-size:20px;letter-spacing:3px;color:#fff}
  .grp-hdr-teams{display:flex;gap:8px;flex-wrap:wrap}
  .grp-chip{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:4px;padding:4px 8px;font-size:11px;font-weight:500;color:#fff;display:flex;align-items:center;gap:4px;white-space:nowrap}

  .md-div{display:flex;align-items:center;gap:10px;margin:16px 0 10px}
  .md-lbl{font-size:10px;letter-spacing:3px;font-weight:700;color:var(--blue);text-transform:uppercase;white-space:nowrap}
  .md-line{flex:1;height:1px;background:var(--border)}

  /* FIXTURES */
  .fx-list{display:flex;flex-direction:column;gap:8px}
  .fx{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 16px;transition:all .2s;box-shadow:var(--sh)}
  .fx:hover{box-shadow:var(--sh-md)}
  .fx.ok{border-color:#15803d;border-width:2px;background:linear-gradient(135deg,#bbf7d0 0%,#86efac 100%);box-shadow:0 4px 20px rgba(21,128,61,.25)}
  .fx.gold{border-color:#D4A843;border-width:2px;background:linear-gradient(135deg,#F5D778 0%,#E8B84B 50%,#F0C84E 100%);box-shadow:0 4px 20px rgba(212,168,67,.35)}
  .fx.bad{border-color:#dc2626;border-width:2px;background:linear-gradient(135deg,#fecaca 0%,#f87171 100%);box-shadow:0 4px 20px rgba(220,38,38,.25)}
  .fx.lkd{opacity:.8}
  .fx-meta{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
  .fx-tag{font-size:9px;letter-spacing:2px;font-weight:700;color:var(--blue);background:var(--blue-light);padding:3px 7px;border-radius:3px;text-transform:uppercase}
  .fx-date{font-size:11px;color:var(--text-muted);font-weight:500}
  .fx-pts{font-size:10px;color:var(--gold);font-weight:700;margin-left:auto;background:var(--gold-light);padding:2px 6px;border-radius:3px}
  .chip{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
  .c-res{color:var(--green);background:var(--green-bg);border:1px solid #1a8a4a}
  .c-ok{color:var(--green);font-weight:700}
  .c-bad{color:var(--red);font-weight:700}
  .c-tip{color:var(--gold);background:var(--gold-light);border:1px solid var(--gold)}
  .c-null{color:var(--text-muted)}
  .c-lkd{color:var(--text-muted);background:var(--surface2);border:1px solid var(--border)}
  .c-np{color:var(--text-muted);font-style:italic}
  .fx-row{display:flex;align-items:center;gap:10px}
  .tb{flex:1;padding:11px 8px;background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:8px;justify-content:center;font-family:var(--font-b);font-size:13px;font-weight:500;transition:all .15s}
  .tb:hover:not(:disabled){border-color:var(--blue-mid);background:var(--blue-light);color:var(--blue)}
  .tb.sel{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 10px rgba(0,82,155,.25)}
  .tb.win{background:var(--green-bg);border-color:var(--green);color:var(--green);font-weight:700}
  .tb:disabled{opacity:.4;cursor:not-allowed}
  .draw-btn{flex:0 0 auto;max-width:90px;padding:11px 10px;font-size:12px}
  .tf{font-size:22px;line-height:1}
  .tf.text-code{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.5px}
  .tn{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
  .vs{display:flex;flex-direction:column;align-items:center;min-width:36px}
  .vs-t{font-size:10px;color:var(--text-muted);letter-spacing:2px;font-weight:700}
  .tbd-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
  .tbd-lbl{font-size:13px;color:var(--text-mid);font-weight:500}
  .tbd-tip{font-size:12px;color:var(--blue);font-weight:600}

  /* LEADERBOARD */
  .lb-sum{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:20px}
  .lb-stat{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;text-align:center;box-shadow:var(--sh)}
  .lb-n{display:block;font-family:var(--font-d);font-size:32px;color:var(--blue);letter-spacing:2px;line-height:1}
  .lb-l{display:block;font-size:9px;letter-spacing:2px;color:var(--text-muted);margin-top:5px;font-weight:600;text-transform:uppercase}
  .lb-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:16px}
  .lt{padding:10px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-muted);cursor:pointer;font-size:11px;letter-spacing:1.5px;font-weight:700;font-family:var(--font-b);margin-bottom:-2px;text-transform:uppercase}
  .lt.on{color:var(--blue);border-bottom-color:var(--blue)}
  .lb-list{display:flex;flex-direction:column;gap:8px}
  .lb-card{display:flex;align-items:center;gap:16px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);transition:box-shadow .2s}
  .lb-card:hover{box-shadow:var(--sh-md)}
  .lb-card.first{border-color:var(--gold);background:var(--gold-light)}
  .lb-rank{font-family:var(--font-d);font-size:24px;min-width:40px;text-align:center;color:var(--text-muted)}
  .lb-info{flex:1}
  .lb-name{font-size:17px;color:var(--text);margin-bottom:4px;font-weight:600}
  .lb-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
  .lb-mi{font-size:11px;color:var(--text-muted);font-weight:500}
  .lb-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
  .lb-bf{height:100%;background:linear-gradient(90deg,var(--blue),var(--gold));border-radius:2px;transition:width .6s}
  .lb-score{font-family:var(--font-d);font-size:34px;color:var(--blue);letter-spacing:1px;text-align:right;line-height:1}
  .lb-pts{font-size:12px;color:var(--text-muted);margin-left:2px;font-family:var(--font-b);font-weight:500}

  /* TABLE LEADERBOARD */
  .tbl-wrap{overflow-x:auto;border-radius:var(--r);box-shadow:var(--sh)}
  table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface)}
  thead th{padding:11px 14px;text-align:left;font-size:9px;letter-spacing:2px;color:var(--text-muted);border-bottom:2px solid var(--border);background:var(--surface2);white-space:nowrap;font-weight:700;text-transform:uppercase}
  thead th.r{text-align:right}
  thead th.c{text-align:center}
  tbody tr{border-bottom:1px solid var(--bg);transition:background .1s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--surface2)}
  td{padding:12px 14px;vertical-align:middle;color:var(--text-mid)}
  td.r{text-align:right}
  td.c{text-align:center}
  td.ok2{background:var(--green-bg);color:var(--green);font-weight:600}
  td.bad2{background:var(--red-bg);color:var(--red)}
  .tbl-rank{font-family:var(--font-d);font-size:20px;color:var(--text-muted);min-width:32px;display:inline-block;text-align:center}
  .tbl-name{font-weight:600;color:var(--text);font-size:14px}
  .tbl-score{font-family:var(--font-d);font-size:22px;color:var(--blue);letter-spacing:1px}
  .tbl-bar-cell{min-width:120px}
  .tbl-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px}
  .tbl-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--gold));border-radius:3px;transition:width .6s}
  .badge-g{display:inline-block;background:var(--green-bg);color:var(--green);border:1px solid #1a8a4a;border-radius:4px;font-size:10px;font-weight:700;padding:2px 6px}
  .badge-r{display:inline-block;background:var(--red-bg);color:var(--red);border:1px solid #e8b0aa;border-radius:4px;font-size:10px;font-weight:700;padding:2px 6px}

  /* GAME DETAIL TABLE */
  .gd-table th{padding:10px 12px}
  .gd-table td{padding:9px 12px;font-size:12px}

  /* ADMIN */
  .ac{margin-bottom:16px;padding:20px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);box-shadow:var(--sh)}
  .ah{font-size:10px;letter-spacing:3px;color:var(--blue);font-weight:700;margin-bottom:14px;border-bottom:2px solid var(--blue-light);padding-bottom:8px;text-transform:uppercase}
  .arow{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .afx{padding:12px 0;border-bottom:1px solid var(--bg)}
  .afx:last-child{border-bottom:none}
  .afx-lbl{font-size:12px;color:var(--text-mid);margin-bottom:8px;font-weight:500}
  .afx-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .rb{padding:7px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;color:var(--text-mid);cursor:pointer;font-size:12px;font-family:var(--font-b);font-weight:500;transition:all .15s;display:flex;align-items:center;gap:6px}
  .rb:hover{border-color:var(--blue-mid);color:var(--blue);background:var(--blue-light)}
  .rb.on{background:var(--green-bg);border-color:var(--green);color:var(--green);font-weight:700}
  .clr{padding:5px 10px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-muted);cursor:pointer;font-size:11px;font-family:var(--font-b)}
  .nr{font-size:11px;color:var(--text-muted)}

  /* Knockout team editor */
  .ko-edit{background:var(--blue-light);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
  .ko-edit-title{font-size:11px;letter-spacing:2px;font-weight:700;color:var(--blue);margin-bottom:12px;text-transform:uppercase}
  .ko-match{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .ko-match-lbl{font-size:12px;color:var(--text-mid);font-weight:500;min-width:140px}
  .ko-input{padding:7px 10px;background:#fff;border:1.5px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:var(--font-b);outline:none;width:160px}
  .ko-input:focus{border-color:var(--blue)}
  .ko-vs{font-size:11px;color:var(--text-muted);font-weight:700}

  .apl-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
  @media(max-width:600px){
    .apl-row{flex-wrap:wrap}
    .apl-row input[type=text]{min-width:120px}
    .pin-disp{min-width:60px}
  }
  .pin-disp{font-family:var(--font-d);font-size:18px;letter-spacing:4px;color:var(--blue);background:var(--blue-light);border:1.5px solid var(--border);border-radius:6px;padding:6px 12px;min-width:80px;text-align:center}
  .pin-inp{width:90px!important;text-align:center;font-size:16px;font-weight:700;letter-spacing:4px}

  input[type=text],input[type=password]{padding:9px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:var(--font-b);outline:none;width:100%;transition:border-color .15s}
  input:focus{border-color:var(--blue);background:#fff}
  .btn{padding:9px 20px;background:var(--blue);border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:13px;font-family:var(--font-b);font-weight:600;transition:all .15s;white-space:nowrap;box-shadow:0 2px 8px rgba(0,82,155,.3)}
  .btn:hover{background:var(--blue-mid)}
  .btn-gh{padding:9px 20px;background:transparent;border:1.5px solid var(--border);border-radius:6px;color:var(--text-mid);cursor:pointer;font-size:13px;font-family:var(--font-b);font-weight:500}
  .btn-rd{padding:7px 14px;background:var(--red-bg);border:1.5px solid #e8b0aa;border-radius:6px;color:var(--red);cursor:pointer;font-size:13px;font-family:var(--font-b);font-weight:600}
  .btn-rd:hover{background:#f9d5d0}
  .danger-row{display:flex;gap:10px;flex-wrap:wrap}
  .pl-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
  .empty{text-align:center;padding:48px 20px;color:var(--text-muted);font-size:13px}

  .sync-dot{width:7px;height:7px;border-radius:50%;background:#4caf89;display:inline-block;margin-left:8px;vertical-align:middle;animation:pulse 2s infinite}
  .sync-dot.syncing{background:var(--gold)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .brand-sub-short{display:none}
  .brand-sub-full{display:inline}
  .mob-pot-icon{font-size:14px;display:block}
  .mob-pot-amt{display:block}
  .hdr-pot{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;padding:0 14px;margin:0 2px;background:var(--gold);color:#fff;font-size:20px;font-weight:700;font-family:var(--font-b);border-radius:4px;white-space:nowrap;height:100%;flex-shrink:0;align-self:stretch;line-height:1.2;cursor:default;gap:0}

  /* GROUP STANDINGS */
  .gs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
  .gs-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
  .gs-hdr{background:var(--blue);padding:10px 14px;display:flex;align-items:center;gap:8px}
  .gs-title{font-family:var(--font-d);font-size:17px;letter-spacing:3px;color:#fff;flex:1}
  .gs-teams{font-size:16px;letter-spacing:2px}
  .gs-played{font-size:10px;color:rgba(255,255,255,.6);letter-spacing:1px;font-weight:600;white-space:nowrap}
  .gs-table{width:100%;border-collapse:collapse;font-size:12px}
  .gs-table thead th{padding:7px 10px;font-size:9px;letter-spacing:1.5px;color:var(--text-muted);border-bottom:1.5px solid var(--border);background:var(--surface2);font-weight:700;text-transform:uppercase}
  .gs-table tbody td{padding:9px 10px;border-bottom:1px solid var(--bg);color:var(--text-mid)}
  .gs-table tbody tr:last-child td{border-bottom:none}
  .gs-table .c{text-align:center}
  .gs-qual td{background:rgba(21,128,61,.08);color:var(--text)}
  .gs-qual td:first-child{border-left:3px solid #15803d}
  .gs-maybe td{background:rgba(234,179,8,.08);color:var(--text)}
  .gs-maybe td:first-child{border-left:3px solid #ca8a04}
  .gs-third-adv td{background:rgba(201,168,76,.1);color:var(--text)}
  .gs-third-adv td:first-child{border-left:3px solid var(--gold)}
  .gs-code{display:inline-block;width:28px;font-size:9px;font-weight:700;color:var(--text-muted);letter-spacing:1px;vertical-align:middle}

async function loadCloud(){
  try{
    const r=await fetch(`${FIREBASE_URL}/state.json`);

    return d||null;
  }catch(e){return null;}

let pendingSave=false;
async function saveCloud(){
  syncing=true;pendingSave=true;syncDot();
  try{
    const r=await fetch(`${FIREBASE_URL}/state.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)});

async function savePath(path,data){

  {id:104,stage:"Final",label:"W101 vs W102",date:"Jul 19",ko:"2026-07-19T19:00:00Z"},
];

const KO_STAGES=["Round of 32","Round of 16","Quarter-Final","Semi-Final","3rd Place","Final"];
function isLocked(fx){return new Date()>=new Date(fx.ko)}
function getKF(){
  // Merge defaults with any admin-set teams from state.koTeams
  return KF_DEFAULT.map(f=>({
    ...f,
    home:(state.koTeams&&state.koTeams[f.id]&&state.koTeams[f.id].home)||null,
    away:(state.koTeams&&state.koTeams[f.id]&&state.koTeams[f.id].away)||null,
  }));
}
function allFixtures(){return[...GF,...getKF()]}

// SCORING
function score(pid){
  const pt=state.tips[pid]||{},ps=state.scoreGuesses&&state.scoreGuesses[pid]||{},AF=allFixtures();
  let sc=0,cor=0,mis=0,tip=0,bonus=0,finalised=0;
  AF.forEach(f=>{
    const key=String(f.id);
    const t=pt[key]||pt[f.id],res=state.results[key]||state.results[f.id],pts=f.group?1:2;
    if(!t){mis++;return;}
    tip++;
    if(res){
      finalised++; // tipped AND has a result
      if(t===res){
        sc+=pts;cor++;
        const rsc=getScore(state.scores,f.id);
        const psc=getScore(ps,f.id);
        const rh=getScoreVal(rsc&&rsc.h),ra=getScoreVal(rsc&&rsc.a);
        const ph=getScoreVal(psc&&psc.h),pa=getScoreVal(psc&&psc.a);
        if(rsc&&psc&&rh===ph&&ra===pa){sc+=1;bonus++;}
      }
    }
  });
  return{sc,cor,mis,tip,bonus,finalised};
}

  const KF=getKF();

function fxCard(f,ptips){
  const myTip=ptips[f.id]||ptips[String(f.id)],res=state.results[f.id]||state.results[String(f.id)],lkd=isLocked(f);
  const cor=myTip&&res&&myTip===res,bad=myTip&&res&&myTip!==res;
  const home=f.home||'TBD',away=f.away||'TBD',isTBD=!f.home||f.home==='TBD';
  const canTip=!lkd&&unlocked&&!isTBD;
  const tipLabel=myTip==='Draw'?'🤝 Draw':myTip?F(myTip)+myTip:'';

  // score guess
  const psg=unlocked?(getScore(state.scoreGuesses&&state.scoreGuesses[unlocked],f.id)||{h:'',a:''}):{h:'',a:''};
  const rsc=getScore(state.scores,f.id);
  const exactBonus=cor&&rsc&&psg&&getScoreVal(rsc.h)===getScoreVal(psg.h)&&getScoreVal(rsc.a)===getScoreVal(psg.a);

  const chips=`
    ${res?`<span class="chip c-res">${res==='Draw'?'🤝 Draw':F(res)+res} ✓</span>`:''}
    ${cor&&!exactBonus?`<span class="chip c-ok">✓ Correct</span>`:''}
    ${exactBonus?`<span class="chip c-bonus">⭐ Exact Score +1</span>`:''}
    ${bad?`<span class="chip c-bad">✗ Wrong</span>`:''}
    ${lkd&&!res?`<span class="chip c-lkd">🔒 Locked</span>`:''}
    ${myTip&&!res&&!lkd?`<span class="chip c-tip">Tipped: ${tipLabel}</span>`:''}
    ${!myTip&&!lkd&&unlocked?`<span class="chip c-null">Not tipped</span>`:''}
    ${!unlocked&&!res?`<span class="chip c-np">Select name to tip</span>`:''}`;

  // score guess row — for any fixture with known teams, when unlocked
  const scoreGuessRow=!isTBD&&unlocked?`
    <div class="sg-row">
      <span class="sg-lbl">Score guess <span class="sg-bonus">(+1 bonus if exact)</span></span>
      <div class="sg-center">
        <input class="sg-inp${lkd?' sg-locked':''}" type="number" min="0" max="20" placeholder="0" value="${psg.h}" ${canTip?`onchange="placeScoreGuess(${f.id},'h',this.value)"`:'disabled'} />
        <span class="sg-dash">-</span>
        <input class="sg-inp${lkd?' sg-locked':''}" type="number" min="0" max="20" placeholder="0" value="${psg.a}" ${canTip?`onchange="placeScoreGuess(${f.id},'a',this.value)"`:'disabled'} />
      </div>
      <div class="sg-spacer"></div>
    </div>`:'';

  if(isTBD)return`<div class="fx${lkd?' lkd':''}">
    <div class="fx-meta"><span class="fx-tag">${f.stage||''}</span><span class="fx-date">${toAESTDate(f.ko)} · ${toAEST(f.ko)}</span><span class="fx-pts">${f.group?1:2}pt</span>${chips}</div>
    <div class="tbd-row"><span class="tbd-lbl">${f.label}</span>${myTip?`<span class="tbd-tip">${F(myTip)}${myTip}</span>`:''}</div>
  </div>`;
  return`<div class="fx${exactBonus?' gold':cor?' ok':bad?' bad':''}${lkd?' lkd':''}">
    <div class="fx-meta"><span class="fx-tag">${f.group?`Group ${f.group}`:f.stage}</span><span class="fx-date">${toAESTDate(f.ko)} · ${toAEST(f.ko)}</span><span class="fx-pts">${f.group?1:2}pt</span>${chips}</div>
    <div class="fx-row">
      <button class="tb${myTip===home?' sel':''}${res===home?' win':''}" ${canTip?'':'disabled'} onclick="placeTip(${f.id},'${home.replace(/'/g,"\\'")}')"><span class="tf text-code">${FLAG[home]||'?'}</span><span class="tn">${home}</span></button>
      ${f.group?`<button class="tb draw-btn${myTip==='Draw'?' sel':''}${res==='Draw'?' win':''}" ${canTip?'':'disabled'} onclick="placeTip(${f.id},'Draw')"><span class="tf">🤝</span><span class="tn">Draw</span></button>`:`<div class="vs"><span class="vs-t">VS</span></div>`}
      <button class="tb${myTip===away?' sel':''}${res===away?' win':''}" ${canTip?'':'disabled'} onclick="placeTip(${f.id},'${away.replace(/'/g,"\\'")}')"><span class="tf text-code">${FLAG[away]||'?'}</span><span class="tn">${away}</span></button>
    </div>
    ${scoreGuessRow}
  </div>`;
}

// GROUP STANDINGS
function buildStandings(){
  // Compute standings from GF results
  function groupTable(g){
    const teams=GROUPS[g];
    const stats={};
    teams.forEach(t=>{stats[t]={p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0};});
    GF.filter(f=>f.group===g).forEach(f=>{
      const res=state.results[f.id];
      const sc=getScore(state.scores,f.id);
      if(!res||!stats[f.home]||!stats[f.away])return;
      const hg=sc&&sc.h!==''?parseInt(sc.h):null;
      const ag=sc&&sc.a!==''?parseInt(sc.a):null;
      stats[f.home].p++;stats[f.away].p++;
      if(hg!==null){stats[f.home].gf+=hg;stats[f.home].ga+=ag;stats[f.away].gf+=ag;stats[f.away].ga+=hg;}
      if(res===f.home){stats[f.home].w++;stats[f.home].pts+=3;stats[f.away].l++;}
      else if(res===f.away){stats[f.away].w++;stats[f.away].pts+=3;stats[f.home].l++;}
      else if(res==='Draw'){stats[f.home].d++;stats[f.home].pts++;stats[f.away].d++;stats[f.away].pts++;}
    });
    teams.forEach(t=>{stats[t].gd=stats[t].gf-stats[t].ga;});
    return teams.map(t=>({name:t,...stats[t]})).sort((a,b)=>{
      // If no games played yet, sort alphabetically
      if(a.p===0&&b.p===0)return a.name.localeCompare(b.name);
      // Otherwise sort by pts, GD, GF
      return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf;
    });
  }

  const groupKeys=Object.keys(GROUPS);
  const tables=groupKeys.map(g=>{
    const rows=groupTable(g);
    const played=rows.reduce((s,r)=>s+r.p,0)/2;
    const totalPossible=6; // 3 matchdays × 2 games
    return`<div class="gs-card">
      <div class="gs-hdr">
        <span class="gs-title">GROUP ${g}</span>
        <span class="gs-played">${played}/${totalPossible} played</span>
      </div>
      <table class="gs-table">
        <thead><tr><th>Team</th><th class="c">P</th><th class="c">W</th><th class="c">D</th><th class="c">L</th><th class="c">GF</th><th class="c">GA</th><th class="c">GD</th><th class="c">Pts</th></tr></thead>
        <tbody>${rows.map((r,i)=>`<tr class="${i<2?'gs-qual':''}${i===2?'gs-maybe':''}">
          <td><span class="gs-code">${FLAG[r.name]||r.name.slice(0,3).toUpperCase()}</span>${r.name}${i===0?'<span class="gs-badge">1st</span>':i===1?'<span class="gs-badge gs-badge2">2nd</span>':''}</td>
          <td class="c">${r.p}</td><td class="c">${r.w}</td><td class="c">${r.d}</td><td class="c">${r.l}</td>
          <td class="c">${r.gf||0}</td><td class="c">${r.ga||0}</td>
          <td class="c" style="font-weight:600;color:${r.gd>0?'var(--green)':r.gd<0?'var(--red)':'var(--text-muted)'}">${r.gd>0?'+':''}${r.gd||0}</td>
          <td class="c"><strong>${r.pts}</strong></td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
  }).join('');

  const totalGroupResults=GF.filter(f=>state.results[f.id]).length;

  // Best 3rd place table
  const thirds=groupKeys.map(g=>{
    const rows=groupTable(g);
    const third=rows[2];
    return third?{...third,group:g}:null;
  }).filter(Boolean).sort((a,b)=>{
    if(a.p===0&&b.p===0)return a.name.localeCompare(b.name);
    return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf;
  });

  const best3rdTable=`
    <div class="gs-card" style="margin-top:20px">
      <div class="gs-hdr" style="background:#5a4a8a">
        <span class="gs-title">BEST 3RD PLACE</span>
        <span class="gs-played">Top 8 advance</span>
      </div>
      <table class="gs-table">
        <thead><tr><th>Team</th><th class="c">Grp</th><th class="c">P</th><th class="c">W</th><th class="c">D</th><th class="c">L</th><th class="c">GF</th><th class="c">GA</th><th class="c">GD</th><th class="c">Pts</th></tr></thead>
        <tbody>${thirds.map((r,i)=>`<tr class="${i<8?'gs-third-adv':''}">

function adminFx(f){
  const res=state.results[String(f.id)]||state.results[f.id],home=f.home||'TBD',away=f.away||'TBD';
  const lkd=isLocked(f);
  const sc=getScore(state.scores,f.id)||{h:'',a:''};
  const bothTeams=home!=='TBD'&&away!=='TBD';
  const drawBtn=f.group?`<button class="rb${res==='Draw'?' on':''}" onclick="setRes(${f.id},'Draw')">🤝 Draw</button>`:'';
  const scoreInp=bothTeams?`
    <span class="score-sep">|</span>
    <input class="score-inp" type="number" min="0" max="20" placeholder="0" value="${sc.h}" oninput="setScore(${f.id},'h',this.value)" title="${home} goals"/>
    <span class="score-vs">-</span>
    <input class="score-inp" type="number" min="0" max="20" placeholder="0" value="${sc.a}" oninput="setScore(${f.id},'a',this.value)" title="${away} goals"/>
  `:'';
  return`<div class="afx">
    <div class="afx-lbl">${f.group?`Group ${f.group} MD${f.md}`:f.stage} · ${f.date} — <strong>${F(home)}${home}</strong> vs <strong>${F(away)}${away}</strong>${f.label?` (${f.label})`:''} ${lkd?'<span style="color:var(--green);font-size:10px;font-weight:700">● LIVE / PLAYED</span>':'<span style="color:var(--text-muted);font-size:10px">○ upcoming</span>'}</div>
    <div class="afx-row">
      ${bothTeams?`<button class="rb${res===home?' on':''}" onclick="setRes(${f.id},'${home.replace(/'/g,"\\'")}')"><span>${F(home)}</span>${home}</button>`:'<span class="nr">Set both teams above first</span>'}
      ${bothTeams?`<button class="rb${res===away?' on':''}" onclick="setRes(${f.id},'${away.replace(/'/g,"\\'")}')"><span>${F(away)}</span>${away}</button>`:''}
      ${bothTeams?drawBtn:''}
      ${res?`<button class="clr" onclick="clrRes(${f.id})">Clear</button>`:''}
      ${!res&&bothTeams?`<span class="nr">No result yet</span>`:''}
      ${scoreInp}
    </div>
  </div>`;
}

function normaliseKeys(){
  // Convert any numeric keys to string keys in results, scores, tips, scoreGuesses
  function norm(obj){
    if(!obj)return obj;
    const out={};
    Object.keys(obj).forEach(k=>{out[String(k)]=obj[k];});
    return out;
  }
  state.results=norm(state.results)||{};
  state.scores=norm(state.scores)||{};
  if(state.tips){Object.keys(state.tips).forEach(pid=>{state.tips[pid]=norm(state.tips[pid])||{};});}
  if(state.scoreGuesses){Object.keys(state.scoreGuesses).forEach(pid=>{state.scoreGuesses[pid]=norm(state.scoreGuesses[pid])||{};});}
}

// ACTIONS
function setV(v){view=v;render()}
function setSt(s){stage=s;render()}
function setG(g){grp=g;render()}
function setLT(t){lbTab=t;render()}
function reqPin(id){
  if(unlocked===id){player=id;render();return}
  const p=state.participants.find(p=>p.id===id);
  if(!p)return;
  if(!p.pin){toast('No PIN set — ask the admin');return}
  pinTarget=id;pinBuf='';pinErr='';render();
}
function lockP(){unlocked=null;player=null;render()}
function placeTip(fid,team){
  if(!unlocked){toast('Select your name and enter your PIN first');return}
  const fx=allFixtures().find(f=>f.id===fid);
  if(!fx||isLocked(fx)){toast('🔒 This match has already started');return}
  if(!state.tips[unlocked])state.tips[unlocked]={};
  const key=String(fid);
  const prev=state.tips[unlocked][key];
  state.tips[unlocked][key]=prev===team?null:team;
  render();
  debSavePath(`tips/${unlocked}`,state.tips[unlocked]);
}
function setRes(fid,team){
  const key=String(fid);
  const prev=state.results[key];
  state.results[key]=prev===team?null:team;
  render();savePath('results',state.results);
  if(state.results[key])toast(`✓ Result: ${team}`);
}
function clrRes(fid){delete state.results[String(fid)];render();savePath('results',state.results);}
function setKOTeam(fid,side,val){
  if(!state.koTeams)state.koTeams={};
  if(!state.koTeams[fid])state.koTeams[fid]={};
  state.koTeams[fid][side]=val.trim();
  savePath('koTeams',state.koTeams);
  // Don't re-render mid-typing, just save
}
function addP(){
  const ne=document.getElementById('np'),pe=document.getElementById('npin');
  const nm=ne?.value?.trim(),pin=pe?.value?.trim();
  if(!nm){toast('Enter a player name');return}
  if(!pin||pin.length!==4||isNaN(pin)){toast('Enter a 4-digit PIN');return}
  const id='p_'+Date.now();
  state.participants.push({id,name:nm,pin});
  render();savePath('participants',state.participants);toast(`Added: ${nm}`);
}
function renameP(id,name){const p=state.participants.find(p=>p.id===id);if(p){p.name=name;savePath('participants',state.participants);}}
function updPin(id,pin){if(pin.length!==4||isNaN(pin)){toast('PIN must be 4 digits');return}const p=state.participants.find(p=>p.id===id);if(p){p.pin=pin;savePath('participants',state.participants);toast(`PIN updated for ${p.name}`);}}
function rmP(id){
  if(!confirm('Remove this player?'))return;
  state.participants=state.participants.filter(p=>p.id!==id);
  delete state.tips[id];
  if(unlocked===id){unlocked=null;player=null;}
  render();saveCloud();
}
function adminSetTip(pid,fid,team){
  if(!state.tips[pid])state.tips[pid]={};
  if(team===null)delete state.tips[pid][String(fid)];
  else state.tips[pid][String(fid)]=team;
  savePath(`tips/${pid}`,state.tips[pid]);
  render();
  toast(team?`✓ Set ${team} for player`:'Tip cleared');
}
function goAdmin(){
  const pass=document.getElementById('ap')?.value;
  if(pass!=='2749'){toast('Incorrect admin PIN');return;}
  adminMode=true;render();
}
function adminSetScore(pid,fid,side,val){
  if(!state.scoreGuesses)state.scoreGuesses={};
  if(!state.scoreGuesses[pid])state.scoreGuesses[pid]={};
  const key=String(fid);
  if(!state.scoreGuesses[pid][key])state.scoreGuesses[pid][key]={h:'',a:''};
  state.scoreGuesses[pid][key][side]=val===''?'':Math.max(0,parseInt(val)||0);
  savePath(`scoreGuesses/${pid}`,state.scoreGuesses[pid]);
}
function setAdminEditPlayer(id){adminEditPlayer=id;render()}
function exitAdmin(){adminMode=false;render()}
function saveBuyIn(){
  const v=parseInt(document.getElementById('buyin-inp')?.value||'0');
  if(isNaN(v)||v<0){toast('Enter a valid amount');return;}
  state.buyIn=v;render();savePath('buyIn',v);toast(v>0?`Buy-in set to $${v}/player — total pot $${state.participants.length*v}`:'Buy-in cleared');
}
function toAEST(koStr){
  const d=new Date(koStr);
  const aest=new Date(d.getTime()+10*60*60*1000);
  const h=aest.getUTCHours(),m=aest.getUTCMinutes();
  const ampm=h>=12?'pm':'am';
  const h12=h%12||12;
  return `${h12}${m?':'+String(m).padStart(2,'0'):''}${ampm} AEST`;
}
function toAESTDate(koStr){
  const d=new Date(koStr);
  const aest=new Date(d.getTime()+10*60*60*1000);
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[aest.getUTCMonth()]} ${aest.getUTCDate()}`;
}
function getScore(obj,fid){if(!obj)return null;return obj[String(fid)]||obj[fid]||null;}
function F(team){return FLAG[team]?`<span class="tf text-code">${FLAG[team]}</span>`:'';}
function placeScoreGuess(fid,side,val){
  if(!unlocked)return;
  const fx=allFixtures().find(f=>f.id===fid);
  if(!fx||isLocked(fx)){toast('🔒 This match has already started');return;}
  if(!state.scoreGuesses)state.scoreGuesses={};
  if(!state.scoreGuesses[unlocked])state.scoreGuesses[unlocked]={};
  const key=String(fid);
  if(!state.scoreGuesses[unlocked][key])state.scoreGuesses[unlocked][key]={h:'',a:''};
  state.scoreGuesses[unlocked][key][side]=val===''?'':Math.max(0,parseInt(val)||0);
  debSavePath(`scoreGuesses/${unlocked}`,state.scoreGuesses[unlocked]);
}
function getScoreVal(v){if(v===''||v===null||v===undefined)return 0;const n=parseInt(v);return isNaN(n)?0:n;}
function setScore(fid,side,val){
  if(!state.scores)state.scores={};
  const key=String(fid);
  if(!state.scores[key])state.scores[key]={h:'',a:''};
  state.scores[key][side]=val===''?'':Math.max(0,parseInt(val)||0);
  savePath('scores',state.scores);
}
function resetAll(){
  const conf=prompt('Type RESET to confirm wiping all tips and results:');
  if(conf!=='RESET'){toast('Reset cancelled');return;}
  state.tips={};state.results={};state.koTeams={};
  state.scores={};state.scoreGuesses={};
  render();saveCloud();toast('All data reset');
}
